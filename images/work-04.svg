<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <!-- two-story family house -->
  <rect width="800" height="600" fill="#e9f2f7"/>
  <circle cx="670" cy="100" r="55" fill="#f6c665" opacity="0.9"/>
  <path d="M0 450 Q 400 400 800 450 V 600 H 0 Z" fill="#b3cf94"/>
  <g>
    <!-- roof -->
    <path d="M170 250 L 400 130 L 630 250 Z" fill="#b5543f"/>
    <path d="M195 240 L 400 145 L 605 240 Z" fill="#cf6a50"/>
    <!-- body: 2 floors -->
    <rect x="210" y="245" width="380" height="260" fill="#fdf8ee" stroke="#dcccb0" stroke-width="4"/>
    <path d="M210 375 H 590" stroke="#dcccb0" stroke-width="5"/>
    <!-- balcony -->
    <rect x="250" y="330" width="140" height="46" fill="#c8a06a"/>
    <g stroke="#a97c50" stroke-width="6">
      <path d="M258 330 V 376 M280 330 V 376 M302 330 V 376 M324 330 V 376 M346 330 V 376 M368 330 V 376"/>
    </g>
    <!-- 2F windows -->
    <rect x="260" y="270" width="120" height="55" fill="#bfe0e8" stroke="#8a5a3b" stroke-width="6"/>
    <rect x="440" y="270" width="110" height="90" fill="#bfe0e8" stroke="#8a5a3b" stroke-width="6"/>
    <path d="M495 270 V 360" stroke="#8a5a3b" stroke-width="5"/>
    <!-- 1F door + window -->
    <rect x="270" y="400" width="86" height="105" rx="4" fill="#7a5a3c"/>
    <circle cx="340" cy="455" r="6" fill="#e9d9ae"/>
    <rect x="420" y="405" width="130" height="80" fill="#bfe0e8" stroke="#8a5a3b" stroke-width="6"/>
    <path d="M485 405 V 485" stroke="#8a5a3b" stroke-width="5"/>
  </g>
  <ellipse cx="400" cy="525" rx="300" ry="24" fill="#96ba79"/>
  <!-- tricycle & ball to hint family -->
  <circle cx="620" cy="505" r="16" fill="#e26d5c"/>
  <path d="M620 497 a 16 16 0 0 1 0 16" stroke="#fdf3e3" stroke-width="5" fill="none"/>
  <g>
    <rect x="118" y="420" width="18" height="95" rx="7" fill="#8a6743"/>
    <circle cx="127" cy="392" r="58" fill="#6f9e57"/>
    <circle cx="90" cy="425" r="38" fill="#7fae66"/>
  </g>
</svg>
