<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf3e3"/>
      <stop offset="1" stop-color="#f7d9a8"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd98a"/>
      <stop offset="1" stop-color="#f6b352"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <circle cx="1250" cy="210" r="110" fill="url(#sun)" opacity="0.9"/>
  <!-- distant hills -->
  <path d="M0 620 Q 300 480 650 600 T 1600 560 V 900 H 0 Z" fill="#cfe0b8"/>
  <path d="M0 700 Q 400 590 900 680 T 1600 660 V 900 H 0 Z" fill="#b3cf94"/>
  <!-- ground -->
  <rect y="740" width="1600" height="160" fill="#9dbf7f"/>
  <!-- trees -->
  <g>
    <rect x="180" y="600" width="26" height="120" rx="8" fill="#8a6743"/>
    <circle cx="193" cy="560" r="88" fill="#6f9e57"/>
    <circle cx="145" cy="600" r="58" fill="#7fae66"/>
    <circle cx="245" cy="605" r="55" fill="#7fae66"/>
  </g>
  <g>
    <rect x="1420" y="640" width="22" height="100" rx="8" fill="#8a6743"/>
    <circle cx="1431" cy="600" r="70" fill="#6f9e57"/>
    <circle cx="1390" cy="638" r="45" fill="#7fae66"/>
    <circle cx="1472" cy="640" r="42" fill="#7fae66"/>
  </g>
  <!-- house -->
  <g>
    <!-- main body -->
    <rect x="560" y="480" width="480" height="280" fill="#fbf6ec" stroke="#d8c8ae" stroke-width="4"/>
    <!-- roof -->
    <path d="M520 490 L 800 320 L 1080 490 Z" fill="#a9683c"/>
    <path d="M545 480 L 800 335 L 1055 480 Z" fill="#c07d4a"/>
    <!-- chimney -->
    <rect x="930" y="360" width="46" height="90" fill="#8a5a3b"/>
    <rect x="922" y="350" width="62" height="18" rx="4" fill="#6f4830"/>
    <!-- door -->
    <rect x="750" y="600" width="100" height="160" rx="6" fill="#8a5a3b"/>
    <rect x="765" y="615" width="70" height="130" rx="4" fill="#a9744c"/>
    <circle cx="828" cy="685" r="7" fill="#f2d8a7"/>
    <!-- windows -->
    <g fill="#bfe0e8" stroke="#8a5a3b" stroke-width="6">
      <rect x="600" y="540" width="110" height="90" rx="6"/>
      <rect x="890" y="540" width="110" height="90" rx="6"/>
    </g>
    <path d="M655 540 V 630 M600 585 H 710" stroke="#8a5a3b" stroke-width="5"/>
    <path d="M945 540 V 630 M890 585 H 1000" stroke="#8a5a3b" stroke-width="5"/>
    <!-- attic window -->
    <circle cx="800" cy="430" r="34" fill="#bfe0e8" stroke="#8a5a3b" stroke-width="6"/>
    <path d="M800 396 V 464 M766 430 H 834" stroke="#8a5a3b" stroke-width="5"/>
  </g>
  <!-- garden -->
  <ellipse cx="800" cy="800" rx="420" ry="34" fill="#8db06f"/>
  <path d="M470 790 h 660" stroke="#e8d9bd" stroke-width="26" stroke-linecap="round"/>
  <g fill="#e08e6d">
    <circle cx="500" cy="742" r="12"/>
    <circle cx="1105" cy="748" r="12"/>
  </g>
  <g fill="#f2b3c6">
    <circle cx="540" cy="752" r="10"/>
    <circle cx="1065" cy="740" r="10"/>
  </g>
  <g stroke="#5d7f45" stroke-width="6" stroke-linecap="round">
    <path d="M500 754 v 26"/>
    <path d="M540 762 v 20"/>
    <path d="M1105 760 v 22"/>
    <path d="M1065 750 v 30"/>
  </g>
  <!-- birds -->
  <g stroke="#8a6743" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M420 240 q 18 -18 36 0 q 18 -18 36 0"/>
    <path d="M520 300 q 14 -14 28 0 q 14 -14 28 0"/>
  </g>
</svg>
